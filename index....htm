<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achraf MATH-VIP</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HERO -->
    <section class="hero">
        <h1>Achraf MATH-VIP</h1>
        <p>Boost your math level with premium exams and solutions.</p>

        <a href="https://wa.me/212786353269" class="main-btn">Join VIP Now</a>
    </section>

    <!-- SECTION -->
    <section class="shop-section">
        <h2 class="section-title">Regional Exams</h2>

        <div class="products-grid">

            <div class="product-card">
                <span class="badge">VIP</span>
                <h3>3rd Year Regional Exams</h3>
                <p>Clear exams with full solutions.</p>

                <div class="product-action">
                    <span class="price">15 DH</span>

                    <div class="buttons">
                        <a href="#" class="view-btn" onclick="openPDF('pdf.pdf')">View</a>
                        <a href="https://wa.me/212786353269" class="shop-btn">Order</a>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- PDF MODAL -->
    <div id="pdfModal" class="pdf-modal">
        <div class="pdf-content">

            <span class="close-btn">&times;</span>

            <iframe id="pdfViewer"></iframe>

        </div>
    </div>

    <!-- JS -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            function openPDF(pdfPath) {
                document.getElementById("pdfModal").style.display = "block";
                document.getElementById("pdfViewer").src = pdfPath;
            }

            window.openPDF = openPDF;

            const closeBtn = document.querySelector(".close-btn");
            const modal = document.getElementById("pdfModal");
            const viewer = document.getElementById("pdfViewer");

            closeBtn.addEventListener("click", function () {
                modal.style.display = "none";
                viewer.src = "";
            });

            window.addEventListener("click", function (event) {
                if (event.target === modal) {
                    modal.style.display = "none";
                    viewer.src = "";
                }
            });

        });
    </script>

</body>

</html>
